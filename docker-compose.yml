version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - MAPBOX_TOKEN=${MAPBOX_TOKEN}
      - FIREBASE_CREDENTIALS=${FIREBASE_CREDENTIALS}
    volumes:
      - ./backend:/app
      - /app/__pycache__
    networks:
      - stadium-gpt-network

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
      - REACT_APP_MAPBOX_TOKEN=${MAPBOX_TOKEN}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - stadium-gpt-network

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - stadium-gpt-network

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=stadiumgpt
      - POSTGRES_USER=stadiumgpt
      - POSTGRES_PASSWORD=stadiumgpt123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - stadium-gpt-network

networks:
  stadium-gpt-network:
    driver: bridge

volumes:
  postgres_data: